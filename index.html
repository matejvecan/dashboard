<!DOCTYPE html>
<html lang="cs">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<meta name="apple-mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
<meta name="apple-mobile-web-app-title" content="Matěj Dashboard" />
<title>Matěj Dashboard</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@300;400;500&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet" />
<style>
:root {
  --bg: #0e0e0f;
  --bg2: #161618;
  --bg3: #1e1e21;
  --border: #2a2a2e;
  --text: #e8e8ea;
  --text2: #8a8a9a;
  --text3: #4a4a5a;
  --green: #1DB87A;
  --green-dim: rgba(29,184,122,0.12);
  --red: #e05c5c;
  --red-dim: rgba(224,92,92,0.12);
  --blue: #5b9cf6;
  --accent: #1DB87A;
  --radius: 14px;
  --radius-sm: 8px;
  --font: 'DM Sans', sans-serif;
  --mono: 'DM Mono', monospace;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
html { scroll-behavior: smooth; }
body {
  background: var(--bg);
  color: var(--text);
  font-family: var(--font);
  min-height: 100vh;
  padding-bottom: 60px;
}
.topbar {
  position: sticky;
  top: 0;
  z-index: 100;
  background: rgba(14,14,15,0.85);
  backdrop-filter: blur(16px);
  -webkit-backdrop-filter: blur(16px);
  border-bottom: 1px solid var(--border);
  padding: 14px 20px;
  display: flex;
  align-items: center;
  justify-content: space-between;
}
.topbar-left { display: flex; flex-direction: column; }
.topbar-date { font-family: var(--mono); font-size: 11px; color: var(--text3); letter-spacing: 0.08em; text-transform: uppercase; }
.topbar-greeting { font-size: 18px; font-weight: 500; margin-top: 2px; }
.topbar-greeting span { color: var(--green); }
.nav-tabs {
  display: flex;
  gap: 4px;
  overflow-x: auto;
  scrollbar-width: none;
  padding: 0 20px;
  margin: 12px 0 0;
  border-bottom: 1px solid var(--border);
}
.nav-tabs::-webkit-scrollbar { display: none; }
.tab-btn {
  font-family: var(--font);
  font-size: 13px;
  font-weight: 500;
  color: var(--text2);
  background: none;
  border: none;
  padding: 8px 14px 10px;
  cursor: pointer;
  border-bottom: 2px solid transparent;
  white-space: nowrap;
  transition: color 0.15s;
}
.tab-btn.active { color: var(--text); border-bottom-color: var(--green); }
.tab-btn:hover { color: var(--text); }
.page { display: none; padding: 16px 16px 0; max-width: 800px; margin: 0 auto; }
.page.active { display: block; }
.section-title {
  font-family: var(--mono);
  font-size: 10px;
  letter-spacing: 0.12em;
  text-transform: uppercase;
  color: var(--text3);
  margin-bottom: 10px;
  margin-top: 20px;
}
.section-title:first-child { margin-top: 4px; }
.card {
  background: var(--bg2);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 16px;
  margin-bottom: 10px;
}
/* --- INPUT STYLES --- */
input[type=text], input[type=number], textarea, select {
  background: var(--bg3);
  border: 1px solid var(--border);
  border-radius: var(--radius-sm);
  color: var(--text);
  font-family: var(--font);
  font-size: 14px;
  padding: 8px 12px;
  outline: none;
  transition: border-color 0.15s;
}
input[type=text]:focus, input[type=number]:focus, textarea:focus, select:focus {
  border-color: var(--green);
}
select option { background: var(--bg3); }
.btn {
  background: var(--bg3);
  border: 1px solid var(--border);
  border-radius: var(--radius-sm);
  color: var(--text);
  font-family: var(--font);
  font-size: 13px;
  padding: 8px 14px;
  cursor: pointer;
  transition: border-color 0.15s, background 0.15s;
}
.btn:hover { border-color: var(--green); }
.btn-green {
  background: var(--green);
  border-color: var(--green);
  color: #000;
  font-weight: 600;
}
.btn-green:hover { background: #18a86e; }
.btn-icon {
  background: var(--bg3);
  border: 1px solid var(--border);
  border-radius: var(--radius-sm);
  color: var(--text2);
  font-size: 16px;
  width: 34px;
  height: 34px;
  display: flex;
  align-items: center;
  justify-content: center;
  cursor: pointer;
  flex-shrink: 0;
  transition: border-color 0.15s, color 0.15s;
}
.btn-icon:hover { border-color: var(--green); color: var(--text); }
.row { display: flex; gap: 8px; align-items: center; }
.row input { flex: 1; }
/* --- TODO --- */
.todo-item {
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 9px 0;
  border-bottom: 1px solid var(--border);
  font-size: 14px;
}
.todo-item:last-child { border-bottom: none; }
.todo-cb { width: 17px; height: 17px; cursor: pointer; accent-color: var(--green); flex-shrink: 0; }
.todo-text { flex: 1; }
.todo-text.done { text-decoration: line-through; color: var(--text3); }
.todo-del { background: none; border: none; cursor: pointer; color: var(--text3); font-size: 16px; padding: 2px 4px; }
.todo-del:hover { color: var(--red); }
/* --- HABITS --- */
.habit-row {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 8px 0;
  border-bottom: 1px solid var(--border);
}
.habit-row:last-child { border-bottom: none; }
.habit-name { font-size: 14px; }
.habit-check {
  width: 28px;
  height: 28px;
  border-radius: 50%;
  border: 1.5px solid var(--border);
  background: var(--bg3);
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 14px;
  transition: all 0.15s;
}
.habit-check.done { background: var(--green); border-color: var(--green); }
/* --- CALENDAR --- */
.cal-item {
  display: flex;
  align-items: center;
  gap: 12px;
  padding: 9px 0;
  border-bottom: 1px solid var(--border);
  font-size: 14px;
}
.cal-item:last-child { border-bottom: none; }
.cal-time { font-family: var(--mono); font-size: 12px; color: var(--text3); min-width: 40px; }
.cal-dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }
/* --- FOOD --- */
.macro-grid { display: grid; grid-template-columns: repeat(4,1fr); gap: 8px; margin-bottom: 12px; }
.macro-box { background: var(--bg3); border-radius: var(--radius-sm); padding: 10px 8px; text-align: center; }
.macro-num { font-size: 20px; font-weight: 600; font-family: var(--mono); }
.macro-lbl { font-size: 11px; color: var(--text2); margin-top: 2px; }
.prog-bar { height: 4px; background: var(--bg3); border-radius: 2px; overflow: hidden; margin: 6px 0 4px; }
.prog-fill { height: 100%; background: var(--green); border-radius: 2px; transition: width 0.3s; }
.food-item {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 7px 0;
  border-bottom: 1px solid var(--border);
  font-size: 13px;
}
.food-item:last-child { border-bottom: none; }
/* --- NETWORTH --- */
.nw-total {
  font-family: var(--mono);
  font-size: 32px;
  font-weight: 500;
  margin: 8px 0 14px;
  transition: filter 0.2s;
}
.nw-total.hidden { filter: blur(10px); user-select: none; }
.nw-item {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 8px 0;
  border-bottom: 1px solid var(--border);
  font-size: 14px;
}
.nw-item:last-child { border-bottom: none; }
.nw-val { font-family: var(--mono); font-size: 14px; }
.nw-val.hidden { filter: blur(6px); user-select: none; }
.badge {
  font-size: 10px;
  font-family: var(--mono);
  padding: 2px 7px;
  border-radius: 20px;
  margin-left: 8px;
  text-transform: uppercase;
  letter-spacing: 0.06em;
}
.badge.asset { background: var(--green-dim); color: var(--green); }
.badge.liability { background: var(--red-dim); color: var(--red); }
/* --- JOURNAL --- */
.journal-area {
  width: 100%;
  min-height: 160px;
  font-size: 15px;
  line-height: 1.7;
  font-family: var(--font);
  background: var(--bg3);
  border: 1px solid var(--border);
  border-radius: var(--radius-sm);
  color: var(--text);
  padding: 12px 14px;
  resize: vertical;
}
.journal-area:focus { border-color: var(--green); outline: none; }
.saved-msg { font-size: 12px; color: var(--green); display: none; margin-left: 10px; font-family: var(--mono); }
/* --- EMPTY --- */
.empty { font-size: 13px; color: var(--text3); text-align: center; padding: 16px 0; font-family: var(--mono); }
/* --- STATS ROW --- */
.stats-row { display: flex; justify-content: space-between; font-size: 11px; font-family: var(--mono); color: var(--text3); }
</style>
</head>
<body>

<div class="topbar">
  <div class="topbar-left">
    <div class="topbar-date" id="topDate"></div>
    <div class="topbar-greeting">Ahoj, <span>Matěji</span> 👋</div>
  </div>
</div>

<div class="nav-tabs">
  <button class="tab-btn active" onclick="showTab('todo')">Úkoly</button>
  <button class="tab-btn" onclick="showTab('habits')">Návyky</button>
  <button class="tab-btn" onclick="showTab('calendar')">Kalendář</button>
  <button class="tab-btn" onclick="showTab('food')">Jídlo</button>
  <button class="tab-btn" onclick="showTab('networth')">Jmění</button>
  <button class="tab-btn" onclick="showTab('journal')">Journaling</button>
</div>

<!-- TODO -->
<div class="page active" id="page-todo">
  <div class="section-title">Dnešní úkoly</div>
  <div class="card">
    <div class="row" style="margin-bottom:12px;">
      <input type="text" id="todoInput" placeholder="Přidat úkol..." style="flex:1;" />
      <button class="btn-icon" onclick="addTodo()">+</button>
    </div>
    <div id="todoList"></div>
  </div>
</div>

<!-- HABITS -->
<div class="page" id="page-habits">
  <div class="section-title">Návyky dnes</div>
  <div class="card" id="habitList"></div>
  <div class="section-title">Přidat návyk</div>
  <div class="card">
    <div class="row">
      <input type="text" id="habitInput" placeholder="Nový návyk..." style="flex:1;" />
      <button class="btn-icon" onclick="addHabit()">+</button>
    </div>
  </div>
</div>

<!-- CALENDAR -->
<div class="page" id="page-calendar">
  <div class="section-title">Dnes v kalendáři</div>
  <div class="card" id="calList"></div>
  <div class="section-title">Přidat událost</div>
  <div class="card">
    <div class="row" style="flex-wrap:wrap;gap:8px;">
      <input type="text" id="calTime" placeholder="Čas (12:00)" style="width:100px;flex:none;" />
      <input type="text" id="calName" placeholder="Název události..." style="flex:1;min-width:140px;" />
      <button class="btn-icon" onclick="addCal()">+</button>
    </div>
  </div>
</div>

<!-- FOOD -->
<div class="page" id="page-food">
  <div class="section-title">Makra dnes</div>
  <div class="card">
    <div class="macro-grid">
      <div class="macro-box"><div class="macro-num" id="fCal">0</div><div class="macro-lbl">kcal</div></div>
      <div class="macro-box"><div class="macro-num" id="fProt">0g</div><div class="macro-lbl">bílkoviny</div></div>
      <div class="macro-box"><div class="macro-num" id="fCarb">0g</div><div class="macro-lbl">sacharidy</div></div>
      <div class="macro-box"><div class="macro-num" id="fFat">0g</div><div class="macro-lbl">tuky</div></div>
    </div>
    <div class="prog-bar"><div class="prog-fill" id="calProg" style="width:0%"></div></div>
    <div class="stats-row"><span>Cíl: 2500 kcal</span><span id="calLeft">2500 zbývá</span></div>
  </div>
  <div class="section-title">Záznamy jídla</div>
  <div class="card" id="foodList"></div>
  <div class="section-title">Přidat jídlo</div>
  <div class="card">
    <div class="row" style="flex-wrap:wrap;gap:8px;margin-bottom:8px;">
      <input type="text" id="fName" placeholder="Název jídla..." style="flex:1;min-width:140px;" />
    </div>
    <div class="row" style="flex-wrap:wrap;gap:8px;">
      <input type="number" id="fCalIn" placeholder="kcal" style="width:80px;flex:none;" />
      <input type="number" id="fProtIn" placeholder="Bílk. g" style="width:80px;flex:none;" />
      <input type="number" id="fCarbIn" placeholder="Sach. g" style="width:80px;flex:none;" />
      <input type="number" id="fFatIn" placeholder="Tuky g" style="width:80px;flex:none;" />
      <button class="btn-icon" onclick="addFood()">+</button>
    </div>
  </div>
</div>

<!-- NETWORTH -->
<div class="page" id="page-networth">
  <div class="section-title">Čisté jmění</div>
  <div class="card">
    <div style="display:flex;align-items:center;justify-content:space-between;">
      <div>
        <div style="font-size:11px;font-family:var(--mono);color:var(--text3);text-transform:uppercase;letter-spacing:0.1em;">Celkem</div>
        <div class="nw-total hidden" id="nwTotal">0 Kč</div>
      </div>
      <button class="btn" onclick="toggleNW()" id="nwBtn">👁 Zobrazit</button>
    </div>
  </div>
  <div class="section-title">Aktiva & závazky</div>
  <div class="card" id="nwList"></div>
  <div class="section-title">Přidat položku</div>
  <div class="card">
    <div class="row" style="flex-wrap:wrap;gap:8px;">
      <input type="text" id="nwName" placeholder="Název (účet, auto...)" style="flex:1;min-width:140px;" />
      <input type="number" id="nwVal" placeholder="Kč" style="width:110px;flex:none;" />
      <select id="nwType" style="width:110px;flex:none;">
        <option value="asset">Aktivum</option>
        <option value="liability">Závazek</option>
      </select>
      <button class="btn-icon" onclick="addNW()">+</button>
    </div>
  </div>
</div>

<!-- JOURNAL -->
<div class="page" id="page-journal">
  <div class="section-title">Dnešní záznam</div>
  <div class="card">
    <textarea class="journal-area" id="journalText" placeholder="Jak byl tvůj den? Co tě napadá, co cítíš, co chceš zítra..."></textarea>
    <div class="row" style="margin-top:10px;">
      <button class="btn btn-green" onclick="saveJournal()">Uložit</button>
      <span class="saved-msg" id="savedMsg">✓ Uloženo</span>
    </div>
  </div>
  <div class="section-title">Předchozí záznamy</div>
  <div id="journalHistory"></div>
</div>

<script>
const today = new Date();
const days = ['Neděle','Pondělí','Úterý','Středa','Čtvrtek','Pátek','Sobota'];
const months = ['ledna','února','března','dubna','května','června','července','srpna','září','října','listopadu','prosince'];
const todayKey = today.toISOString().slice(0,10);
document.getElementById('topDate').textContent = days[today.getDay()] + ', ' + today.getDate() + '. ' + months[today.getMonth()] + ' ' + today.getFullYear();

function showTab(tab) {
  document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
  document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
  document.getElementById('page-'+tab).classList.add('active');
  event.target.classList.add('active');
}

// STORAGE
const get = (k, def) => { try { return JSON.parse(localStorage.getItem(k)) ?? def; } catch { return def; } };
const set = (k, v) => localStorage.setItem(k, JSON.stringify(v));

// TODO
let todos = get('todos_'+todayKey, []);
function renderTodos() {
  const el = document.getElementById('todoList');
  if (!todos.length) { el.innerHTML = '<div class="empty">// žádné úkoly</div>'; return; }
  el.innerHTML = todos.map((t,i) => `
    <div class="todo-item">
      <input type="checkbox" class="todo-cb" ${t.done?'checked':''} onchange="toggleTodo(${i})" />
      <span class="todo-text ${t.done?'done':''}">${t.text}</span>
      <button class="todo-del" onclick="deleteTodo(${i})">×</button>
    </div>`).join('');
}
function addTodo() {
  const inp = document.getElementById('todoInput');
  const v = inp.value.trim(); if (!v) return;
  todos.push({text:v,done:false}); set('todos_'+todayKey,todos); renderTodos(); inp.value='';
}
function toggleTodo(i) { todos[i].done=!todos[i].done; set('todos_'+todayKey,todos); renderTodos(); }
function deleteTodo(i) { todos.splice(i,1); set('todos_'+todayKey,todos); renderTodos(); }
document.getElementById('todoInput').addEventListener('keydown',e=>{ if(e.key==='Enter') addTodo(); });

// HABITS
let habits = get('habits', [{name:'Meditace'},{name:'Cvičení'},{name:'Čtení'},{name:'Coldcalling'},{name:'Zdravé jídlo'}]);
let habitDone = get('habitDone_'+todayKey, {});
function renderHabits() {
  const el = document.getElementById('habitList');
  if (!habits.length) { el.innerHTML = '<div class="empty">// žádné návyky</div>'; return; }
  el.innerHTML = habits.map((h,i) => `
    <div class="habit-row">
      <span class="habit-name">${h.name}</span>
      <div class="habit-check ${habitDone[i]?'done':''}" onclick="toggleHabit(${i})">${habitDone[i]?'✓':''}</div>
    </div>`).join('');
}
function toggleHabit(i) { habitDone[i]=!habitDone[i]; set('habitDone_'+todayKey,habitDone); renderHabits(); }
function addHabit() {
  const inp=document.getElementById('habitInput'); const v=inp.value.trim(); if(!v) return;
  habits.push({name:v}); set('habits',habits); renderHabits(); inp.value='';
}
document.getElementById('habitInput').addEventListener('keydown',e=>{ if(e.key==='Enter') addHabit(); });

// CALENDAR
let calEvents = get('cal_'+todayKey, [{time:'12:00',name:'Oběd',color:'#1DB87A'},{time:'14:00',name:'Coldcalling',color:'#5b9cf6'}]);
function renderCal() {
  const el = document.getElementById('calList');
  if (!calEvents.length) { el.innerHTML = '<div class="empty">// prázdný den</div>'; return; }
  const sorted = [...calEvents].sort((a,b)=>a.time.localeCompare(b.time));
  el.innerHTML = sorted.map((e,i) => `
    <div class="cal-item">
      <span class="cal-time">${e.time}</span>
      <span class="cal-dot" style="background:${e.color||'#1DB87A'}"></span>
      <span style="flex:1;">${e.name}</span>
      <button class="todo-del" onclick="deleteCal(${i})">×</button>
    </div>`).join('');
}
function addCal() {
  const t=document.getElementById('calTime').value.trim();
  const n=document.getElementById('calName').value.trim();
  if(!t||!n) return;
  const colors=['#1DB87A','#5b9cf6','#e0a85c','#c45bf6','#e05c5c'];
  calEvents.push({time:t,name:n,color:colors[calEvents.length%colors.length]});
  set('cal_'+todayKey,calEvents); renderCal();
  document.getElementById('calTime').value=''; document.getElementById('calName').value='';
}
function deleteCal(i) { calEvents.splice(i,1); set('cal_'+todayKey,calEvents); renderCal(); }

// FOOD
let foods = get('foods_'+todayKey, []);
const CAL_GOAL = 2500;
function renderFood() {
  const totCal=foods.reduce((s,f)=>s+(f.cal||0),0);
  const totProt=foods.reduce((s,f)=>s+(f.prot||0),0);
  const totCarb=foods.reduce((s,f)=>s+(f.carb||0),0);
  const totFat=foods.reduce((s,f)=>s+(f.fat||0),0);
  document.getElementById('fCal').textContent=totCal;
  document.getElementById('fProt').textContent=totProt+'g';
  document.getElementById('fCarb').textContent=totCarb+'g';
  document.getElementById('fFat').textContent=totFat+'g';
  document.getElementById('calProg').style.width=Math.min(100,Math.round(totCal/CAL_GOAL*100))+'%';
  document.getElementById('calLeft').textContent=Math.max(0,CAL_GOAL-totCal)+' zbývá';
  const el=document.getElementById('foodList');
  if(!foods.length){el.innerHTML='<div class="empty">// zatím nic</div>';return;}
  el.innerHTML=foods.map((f,i)=>`
    <div class="food-item">
      <span>${f.name}</span>
      <span style="color:var(--text2);font-family:var(--mono);font-size:12px;">${f.cal} kcal${f.prot?` · ${f.prot}g B`:''} <button class="todo-del" onclick="deleteFood(${i})">×</button></span>
    </div>`).join('');
}
function addFood() {
  const n=document.getElementById('fName').value.trim();
  const c=parseInt(document.getElementById('fCalIn').value)||0;
  const p=parseInt(document.getElementById('fProtIn').value)||0;
  const cb=parseInt(document.getElementById('fCarbIn').value)||0;
  const ft=parseInt(document.getElementById('fFatIn').value)||0;
  if(!n||!c) return;
  foods.push({name:n,cal:c,prot:p,carb:cb,fat:ft}); set('foods_'+todayKey,foods); renderFood();
  ['fName','fCalIn','fProtIn','fCarbIn','fFatIn'].forEach(id=>document.getElementById(id).value='');
}
function deleteFood(i){foods.splice(i,1);set('foods_'+todayKey,foods);renderFood();}

// NETWORTH
let nwItems = get('networth',[]);
let nwVisible = false;
function renderNW() {
  const total=nwItems.reduce((s,i)=>i.type==='asset'?s+i.val:s-i.val,0);
  const fmt=v=>v.toLocaleString('cs-CZ')+' Kč';
  document.getElementById('nwTotal').textContent=fmt(total);
  document.getElementById('nwTotal').className='nw-total'+(nwVisible?'':' hidden');
  document.getElementById('nwBtn').textContent=nwVisible?'🙈 Skrýt':'👁 Zobrazit';
  const el=document.getElementById('nwList');
  if(!nwItems.length){el.innerHTML='<div class="empty">// žádné položky</div>';return;}
  el.innerHTML=nwItems.map((item,i)=>`
    <div class="nw-item">
      <span>${item.name}<span class="badge ${item.type}">${item.type==='asset'?'aktivo':'závazek'}</span></span>
      <span><span class="nw-val${nwVisible?'':' hidden'}">${fmt(item.val)}</span> <button class="todo-del" onclick="deleteNW(${i})">×</button></span>
    </div>`).join('');
}
function toggleNW(){nwVisible=!nwVisible;renderNW();}
function addNW(){
  const n=document.getElementById('nwName').value.trim();
  const v=parseInt(document.getElementById('nwVal').value)||0;
  const t=document.getElementById('nwType').value;
  if(!n||!v) return;
  nwItems.push({name:n,val:v,type:t}); set('networth',nwItems); renderNW();
  document.getElementById('nwName').value=''; document.getElementById('nwVal').value='';
}
function deleteNW(i){nwItems.splice(i,1);set('networth',nwItems);renderNW();}

// JOURNAL
document.getElementById('journalText').value=localStorage.getItem('journal_'+todayKey)||'';
function saveJournal(){
  localStorage.setItem('journal_'+todayKey,document.getElementById('journalText').value);
  const s=document.getElementById('savedMsg'); s.style.display='inline';
  setTimeout(()=>s.style.display='none',2000);
  renderJournalHistory();
}
function renderJournalHistory(){
  const el=document.getElementById('journalHistory');
  const entries=[];
  for(let i=0;i<localStorage.length;i++){
    const k=localStorage.key(i);
    if(k.startsWith('journal_')&&k!=='journal_'+todayKey){
      const date=k.replace('journal_','');
      const text=localStorage.getItem(k);
      if(text) entries.push({date,text});
    }
  }
  entries.sort((a,b)=>b.date.localeCompare(a.date));
  if(!entries.length){el.innerHTML='<div class="card"><div class="empty">// zatím žádné záznamy</div></div>';return;}
  el.innerHTML=entries.slice(0,5).map(e=>`
    <div class="card" style="margin-bottom:10px;">
      <div style="font-family:var(--mono);font-size:11px;color:var(--text3);margin-bottom:8px;">${e.date}</div>
      <div style="font-size:14px;line-height:1.6;color:var(--text2);">${e.text.slice(0,200)}${e.text.length>200?'...':''}</div>
    </div>`).join('');
}

// INIT
renderTodos(); renderHabits(); renderCal(); renderFood(); renderNW(); renderJournalHistory();
</script>
